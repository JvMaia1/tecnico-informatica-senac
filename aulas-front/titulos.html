    <!-- Comentário html -->
    <!-- A utilização de tags de tìtulo (heading) segue uma lògica de hierarquia. Exemplo: para ter um <h3>, necessariamente devemos ter antes um <h2> e um <h1>. Obs.: vai de <h1> até <h6>. -->

        <h2>Dados pessoais</h2>

        <h2>Experiências</h2>
