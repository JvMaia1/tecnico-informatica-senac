<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid layout</title>
    <style>
        .container{
            border:2px dashed #ccc;
            padding: 10px;
            display: grid;
            gap: 10px;
            /* configuração do grid */
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 80px 100px;

        }

        .item {
            padding: 20px;
            background-color: greenyellow;
            text-align: center;
            border-radius: 4px;
        }

        .a{
            /* grid-row: 1 3; */
            background-color: red;
            grid-row-start: 1;
            grid-row-end: 3;
        }

        .b {
            background-color: blue;
            grid-column-start: 2 ;
            grid-column-end: 4;
        }

        .e {
            grid-column: 1 / 4;
        }
    </style>
</head>
<body>
    <h1>Grid layout</h1>
    <p>Grid Layout é um sistema nativo do CSS para estruturar e organizar layout bidimensional, ou seja, que utilize <b>linhas</b> e <b>colunas</b> ao mesmo tempo.</p>

    <div class="container">
        <div class="item a">A</div>
        <div class="item b">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item e">E</div>

    </div>
</body>
</html>
