<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos multimídia</title>
</head>
<body>
    <h1>Trabalhando com elementos multimídia</h1>
    <hr>
        <h2>Àudio</h2>
            <!-- atributo booleano () -->
            <!-- controls, muted, autoplay e loop -->
            <audio controls muted>
                <source src="multimidia/judas-priest.mp3" type="audio/mp3">
                <source src="multimidia/judas-priest.ogg" type="audio/ogg">
            </audio>
        <hr>

        <h2>
            <video controls muted>
                <source src="multimidia/pink-floyd.mp4" type="video/mp4">
                <source src="multimidia/pink-floyd.webm" type="video/webm">
                <track src="multimidia/pink-floyd_legenda.vtt" kind="subtitles" srclang="en">
                <!-- o jão é um bobão cara de mamão -->
                
            </video>
        </h2>
</body>
</html>
