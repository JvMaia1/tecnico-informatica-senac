<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seletores Is e Has</title>
    <style>
        :root{
            --borda: solid 4px #93D9B1;
            --cor-destaque: #93A6D9;
            --cor-fundo: #93BCD9;
            --raio-borda: 3px;
        }

        *, *::before *::after{ box-sizing: border-box; }

        body{
            padding: 2rem;
            background-color: #93BCD9 ;
        }

        h1{text-align: center;}

        h2{
            border: var(--borda);
            padding: 0.5rem;
            border-radius: var(--raio-borda) ;
        }

        
        article{
            background-color: var(--cor-destaque) ;
            padding: 1rem;
            border-radius: 10px;
            margin-block: 20px;
            margin-inline: auto;
            max-width: 70%;
            
        }
        img {max-width: 100%;}
        
        a{
            text-decoration:none ;
            background-color: rgb(100, 114, 153);
            padding: 0.2rem;
        }
        /* Agrupamos dentro do contexto do article usando pseudo-classe
        :is() e formatamos os elemento ali contidos*/
        article :is(h2, p, span){
            color: red;
        }
        /* Usamos o :has() para atraves de uma condição baseada
        no filho, conseguir formatar o pai */
        article:has(img){
            --borda: solid rgb(255, 0, 0);
        }

        article:has(a:hover){
            box-shadow: red 0 0 10px;
        }

    </style>
</head>
<body>
    <h1>Usando seletores <code>is</code> e <code>has</code></h1>
    <article>
        <h2>Exemplo 1</h2>
            <p>Aqui temos um texto qualquer</p>
            <span>Aqui outro texto....</span>
    </article>
    
    <article>
        <h2>Exemplo 2: artigo com imagem</h2>
            <img src="img/front-end.jpg" alt="">
            <p>Aqui temos imagem e texto</p>
    </article>

    <article>
        <h2>Exemplo 3: texto com link</h2>
            <p>Texto qualquer....</p>
            <a href="">Link qualquer</a>
    </article>
    
    <hr>

    <h2>Outro titulo...</h2>
    
    <p>Outro texto..</p>

    <span>Outro texto em span..</span>
</body>
</html>
