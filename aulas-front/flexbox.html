<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <link rel="stylesheet" href="css/flexbox.css">
</head>
<body>
    <!-- Barra de navegação -->
    <nav>
        <a href="">Início</a>
        <a href="">Cursos</a>
        <a href="">Contato</a>
    </nav>
    
    <!-- Hero section/Seção de destaque ou CTA (call to action) -->
    <section class="hero">
        <h1>Aprenda CSS do zero!</h1>
        <p>Layouts modernos com Flexbox</p>
        <a href="">Inscreva-se</a>
    </section>
    
    <!-- Banner publicitário -->
    <div class="banner">
        Promoção: 50% OFF hoje!
    </div>

    <!-- Cards (cartões) de conteúdo -->
    <main class="cards" >
        <article class="card" id="html">
            <h2>HTML</h2>
            <p>Estrutura das páginas.</p>
        </article>

        <article class="card" id="css">
            <h2>CSS</h2>
            <p>Estilo, layout e animação.</p>
        </article>

        <article class="card" id="js">
            <h2>JS</h2>
            <p>Comportamento e interatividade.</p>
        </article>
    </main>
</body>
</html>
