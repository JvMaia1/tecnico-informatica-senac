<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid - Novo Layout</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: system-ui, sans-serif;
    padding: 20px;
    background: #f4f4f4;
}

header{
    display: flex;
    h1 {font-size: clamp(26px, 5vw, 5rem);}
    align-items: center;
    justify-content: space-between;
    background-color: crimson;
    padding: 1rem;
    border-radius: 1rem;
    a{
        color: black;
        text-decoration: none;
        text-shadow:  0 0 10px white;
    }
}

main{
    display: grid;
    margin-block: 1rem;
    gap: 10px;
    grid-template-columns: 1fr;
    grid-template-rows: 150px 200px;

    grid-template-areas: 
    'promocao'
    'destaque1'
    'destaque2'
    'banner1'
    'banner2'
    'banner3';

}

footer{
    background-color: #ccc;
    text-align: center;
}

article{
    border: red 1px solid;
    border-radius: 0.5rem;
    font-weight: bold;
    padding: 10px;
    min-height: 100px;
}

.promocao{
    background-color:orange;
    grid-area: promocao;
}

.destaque1 { 
    background-color: pink;
    grid-area: destaque1;
}

.destaque2 {
    background-color: rgb(255, 192, 247);
    grid-area: destaque2;
}

.banner1 { 
    background-color: greenyellow;
    grid-area: banner1;
}

.banner2 { 
    background-color: rgb(39, 169, 209); 
    grid-area: banner2;
}

.banner3 { 
    background-color: chocolate;
    grid-area: banner3;
}

@media (min-width: 700px) {
    main{
        grid-template-columns: 1fr 2fr 1fr;
        grid-template-areas:
        'promocao destaque1 banner1'
        'promocao destaque2 banner2'
        'banner3 banner3 banner3'
        ;
    }
}


</style>
</head>

<body>

<header>
    <h1>Meu Portal</h1>

    <nav>
    <a href="">Home</a>
    <a href="">Produtos</a>
    <a href="">Contato</a>
    </nav>    
</header>

<main>
    <article class="promocao">Promoção</article>
    <article class="destaque1">Destaque 1</article>
    <article class="destaque2">Destaque 2</article>
    <article class="banner1">Banner 1</article>
    <article class="banner2">Banner 2</article>
    <article class="banner3">Banner 3</article>
</main>

<footer>Rodapé</footer>

</body>
</html>
