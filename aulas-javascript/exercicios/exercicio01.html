<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 1</title>
</head>
<body>
    <h1>Exercicio 01</h1>

    <script>
        let nomeQueQuiser = 65;
        let nomeQueQuiser2 = 145;
        let soma = nomeQueQuiser + nomeQueQuiser2;
        let subtracao = nomeQueQuiser - nomeQueQuiser2;
        let multipicacao = nomeQueQuiser * nomeQueQuiser2;
        let divisao = nomeQueQuiser / nomeQueQuiser2;
        let total = soma + multipicacao + divisao + subtracao;

        console.log(`Resultado de operações com ${nomeQueQuiser} e ${nomeQueQuiser2}`);
        console.log(`Soma: ${nomeQueQuiser} + ${nomeQueQuiser2} = ${soma}`);
        console.log(`Subtração: ${nomeQueQuiser} - ${nomeQueQuiser2} = ${subtracao}`);
        console.log(`Multiplicação: ${nomeQueQuiser} * ${nomeQueQuiser2} = ${multipicacao}`);
        console.log(`Divisão: ${nomeQueQuiser} / ${nomeQueQuiser2} = ${divisao}`);
        console.log(`Media de todas as operações: ${total/4}`);
        
        
        
        
        

        
    </script>
    
</body>
</html>
